services:
  builder:
    build:
      context: .
      args:
        SPIKE_RT_REPO: ${SPIKE_RT_REPO:-https://github.com/shimojima/spike-rt.git}
        SPIKE_RT_REF: ${SPIKE_RT_REF:-etrobo}
    image: etrobo-basic-builder:latest
    # ルートのMakefileを既定で参照できるようにする
    working_dir: /workspace
    volumes:
      # ルートMakefileと関連ファイルを参照するため、リポジトリ全体をマウント
      - ./:/workspace
      # appフォルダのみをworkspace配下にマウント
      - ./app:/opt/spike-rt/sdk/workspace/${APP_IMG:-kait-etrobocon2026}
