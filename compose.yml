services:
  builder:
    build:
      context: .
      args:
        SPIKE_RT_REPO: ${SPIKE_RT_REPO:-https://github.com/shimojima/spike-rt.git}
        SPIKE_RT_REF: ${SPIKE_RT_REF:-etrobo}
    image: etrobo-basic-builder:latest
    tty: true
    working_dir: /opt/spike-rt/sdk/workspace/${APP_IMG:-kait-etrobocon2026}
    privileged: true
    device_cgroup_rules:
      - "c 189:* rmw"
    volumes:
      - ./:/opt/spike-rt/sdk/workspace/${APP_IMG:-kait-etrobocon2026}
      - /dev/bus/usb:/dev/bus/usb
